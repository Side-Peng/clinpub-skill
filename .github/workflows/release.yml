name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify SKILL.md exists
        run: test -f SKILL.md || (echo "ERROR: SKILL.md not found" && exit 1)

      - name: Test installer
        run: |
          node bin/install.js --local
          test -d .claude/skills/clinpub-clinpub || (echo "ERROR: Installer failed" && exit 1)
          rm -rf .claude/

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## clinpub ${{ github.ref_name }}

            ### Install

            ```bash
            npx clinpub-cc@latest
            ```

            ### Quick Start

            ```bash
            /clinpub                    # Full 5-phase pipeline
            /clinpub-data2idea data.csv # Topic mining
            ```

            See [INSTALL.md](INSTALL.md) for full setup.
